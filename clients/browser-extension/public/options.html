<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Quidnug — Options</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 640px;
            margin: 40px auto;
            padding: 0 20px;
            color: #222;
        }
        h1 { font-size: 22px; }
        label { display: block; margin-top: 16px; font-weight: 600; }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 4px;
        }
        button {
            margin-top: 16px;
            padding: 8px 16px;
            background: #2a5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .status { margin-top: 12px; font-size: 14px; color: #080; }
    </style>
</head>
<body>
    <h1>Quidnug Options</h1>
    <p>Connect your browser extension to a Quidnug node.</p>

    <label>Node URL
        <input id="node" type="text" placeholder="http://localhost:8080">
    </label>

    <label>Bearer token (optional)
        <input id="token" type="password" placeholder="optional">
    </label>

    <button id="save">Save</button>
    <div id="status" class="status"></div>

    <script type="module" src="options.js"></script>
</body>
</html>
