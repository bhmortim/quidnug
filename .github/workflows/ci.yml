name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Kept in sync with go.mod's toolchain line. Bump this when go.mod
  # moves to a newer toolchain; otherwise the Docker and setup-go
  # jobs will use a version that can't satisfy go.mod's minimum.
  GO_VERSION_DEFAULT: "1.25"

permissions:
  contents: read

jobs:
  uniformity:
    # QDP-0013 §3: the reference implementation must not hardcode
    # any identifier tied to the quidnug.com public network in
    # production code paths. Test files, docs, examples, the
    # deploy/ operator playbooks, and test-vector generators may
    # legitimately name specific public-network domains and are
    # exempt.
    name: QDP-0013 uniformity invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded public-network identifiers
        run: |
          set -euo pipefail
          pattern='"(reviews\.public|network\.quidnug|operators\.network|api\.quidnug\.com)'
          # Production paths only — no tests, examples, or docs.
          # cmd/quidnug-test-vectors is a test-fixture generator
          # and is exempt by category (it deliberately encodes the
          # canonical example domains so cross-SDK consumers have
          # stable strings to round-trip).
          targets=(internal cmd pkg clients/js/quidnug-client.js clients/js/quidnug-client-v2.js)
          found=0
          for t in "${targets[@]}"; do
              [ -e "$t" ] || continue
              if grep -rEn --include='*.go' --include='*.js' --include='*.ts' \
                   --exclude='*_test.go' \
                   --exclude='*.test.js' \
                   --exclude-dir='quidnug-test-vectors' \
                   "$pattern" "$t"; then
                  found=1
              fi
          done
          if [ "$found" = "1" ]; then
              echo "::error::QDP-0013 uniformity invariant violated: hardcoded public-network identifier"
              echo "::error::The reference implementation must be network-neutral. Move any public-network"
              echo "::error::specifics into config, tests, docs, or examples."
              exit 1
          fi
          echo "✓ no hardcoded public-network identifiers in production code"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    # TODO(lint-cleanup): the Go-1.25 bump reactivated CI that had
    # been dark for a while, surfacing ~180 errcheck and contextcheck
    # issues that accumulated in the interim. Report the findings
    # but don't block Build/Docker on them until we land the cleanup
    # pass. Drop this flag once the backlog is zero.
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION_DEFAULT }}
          cache: true

      - name: Run golangci-lint
        # The action's major version needs to match the linter's
        # major version: v6 of the action only accepts v1.x of
        # golangci-lint, and v1.x was built against Go 1.24 which
        # can't load a project targeting Go 1.25. v7 of the
        # action accepts v2.x of the linter, which handles 1.25.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0
          args: --timeout=5m

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matrix needs at least the minimum go.mod version.
        go-version: ["1.25"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      # TODO(go-races): the race detector surfaces pre-existing
      # data races in initLogger + BroadcastDomainInfo + some
      # gossip-test reflect decodes. Re-enable `-race` and
      # `-covermode=atomic` after those are repaired.
      - name: Run tests
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        if: matrix.go-version == env.GO_VERSION_DEFAULT
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION_DEFAULT }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -exclude-dir=clients -no-fail -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec

  build:
    name: Build
    runs-on: ubuntu-latest
    # lint is advisory during the cleanup backlog — see
    # TODO(lint-cleanup) on the lint job.
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION_DEFAULT }}
          cache: true

      - name: Build binary
        run: go build -trimpath -ldflags="-s -w" -o quidnug ./cmd/quidnug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quidnug-linux-amd64
          path: quidnug
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    # lint is advisory during the cleanup backlog — see
    # TODO(lint-cleanup) on the lint job.
    needs: [test]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: quidnug:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: quidnug:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

      # `secrets.*` can't be referenced in `if:` conditions — GitHub
      # Actions rejects the whole workflow at parse time if you do.
      # We rebind the secret into an env var and gate on that.
      - name: Detect Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          steps.dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/quidnug:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/quidnug:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
