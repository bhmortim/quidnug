global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/quidnug-alerts.yml

scrape_configs:
  - job_name: quidnug
    static_configs:
      - targets:
          - n1:8080
          - n2:8080
          - n3:8080
        labels:
          environment: dev-compose
